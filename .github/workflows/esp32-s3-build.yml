name: ESP32-S3 Hiwonder Vision Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Hiwonder S3 Firmware
    runs-on: ubuntu-latest
    container: espressif/idf:release-v6.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix berkeley-db GCC compatibility
        shell: bash
        run: |
          python3 << 'EOF'
          import glob
          patch_text = '''#ifndef __P
#define __P(args) args
#endif
#ifndef __BEGIN_DECLS
#define __BEGIN_DECLS
#endif
#ifndef __END_DECLS
#define __END_DECLS
#endif
'''
          for f in glob.glob('lib/micropython/lib/berkeley-db-1.xx/include/berkeley-db/*.h'):
              with open(f, 'r') as fh:
                  content = fh.read()
              with open(f, 'w') as fh:
                  fh.write(patch_text + content)
              print(f'Patched {f}')
          EOF

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          make BOARD=HIWONDER_S3 all

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hiwonder-s3
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
          retention-days: 30
          if-no-files-found: error

      - name: Merge firmware binary
        if: success()
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd build
          esptool.py --chip esp32s3 merge_bin -o firmware_merged.bin @flash_args

      - name: Upload merged firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hiwonder-s3-merged
          path: build/firmware_merged.bin
          retention-days: 30
