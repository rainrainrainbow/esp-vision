name: ESP32-S3 EYE Vision Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ESP32-S3 EYE Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            -e BOARD=ESP32_S3_EYE \
            espressif/idf:release-v6.0 \
            bash -c '
              set -e
              git config --global --add safe.directory "*"
              . $IDF_PATH/export.sh
              make BOARD=ESP32_S3_EYE all
            '

      - name: List build outputs
        run: |
          echo "=== build directory ==="
          find build -type f \( -name "*.bin" -o -name "*.elf" \) | sort
          echo "=== flash args ==="
          cat build/ESP32_S3_EYE/idf6.0/flash_args 2>/dev/null || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-esp32s3-eye
          path: |
            build/**/*.bin
            build/**/*.elf
            build/**/*.map
            build/**/flasher_args.json
          retention-days: 30
          if-no-files-found: ignore
