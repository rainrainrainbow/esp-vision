name: Test Upload If

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo test > file.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test
          path: file.txt
          if-no-files-found: ignore
