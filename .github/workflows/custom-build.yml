name: Build ESP32-S3-CUSTOM

on:
  push:
    branches: [ feature/esp32-s3-custom-board ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        run: |
          docker run --rm -v "${{ github.workspace }}:/project" -w /project -e BOARD=ESP32_S3_CUSTOM espressif/idf:release-v6.1 bash -c '
            set -e
            git config --global --add safe.directory "*"
            . $IDF_PATH/export.sh
            make BOARD=ESP32_S3_CUSTOM all
          '

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: esp32-s3-custom-firmware
          path: build/**/*.bin
          retention-days: 30
