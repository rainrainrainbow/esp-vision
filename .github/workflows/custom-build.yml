name: Build ESP32-S3-CUSTOM

on:
  push:
    branches: [ feature/esp32-s3-custom-board ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build firmware
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            -e HOME=/root \
            espressif/idf:release-v6.1 \
            bash /project/build_custom.sh 2>&1

      - name: List outputs
        if: always()
        run: |
          echo "=== Build output ==="
          find . -name "*.bin" -o -name "flasher_args.json" 2>/dev/null | head -20
          ls -lah build/ 2>/dev/null || echo "no build/"

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p firmware_out
          find . -name "*.bin" -exec cp {} firmware_out/ \; 2>/dev/null || true
          find . -name "flasher_args.json" -exec cp {} firmware_out/ \; 2>/dev/null || true
          ls -lah firmware_out/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: esp32-s3-custom-firmware
          path: firmware_out/
          retention-days: 30
          if-no-files-found: warn