name: ESP32-S3 Hiwonder Vision Build

on:
  push:
    branches: [main, master]
    paths:
      - 'boards/HIWONDER_S3/**'
      - 'platform/**'
      - 'modules/**'
      - 'components/**'
      - 'micropython.cmake'
      - 'Makefile'
      - 'idf_ext.py'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Hiwonder S3 Firmware
    runs-on: ubuntu-latest
    container: espressif/idf:v6.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: |
            managed_components
            lib/micropython
          key: hiwonder-s3-${{ hashFiles('idf_component_manager.lock', '.gitmodules') }}
          restore-keys: |
            hiwonder-s3-

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          make BOARD=HIWONDER_S3 all

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hiwonder-s3
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
          retention-days: 30
          if-no-files-found: error

      - name: Merge firmware binary
        if: success()
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd build
          esptool.py --chip esp32s3 merge_bin \
            -o firmware_merged.bin \
            @flash_args

      - name: Upload merged firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hiwonder-s3-merged
          path: build/firmware_merged.bin
          retention-days: 30

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-hiwonder-s3
          path: firmware

      - name: Download merged firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-hiwonder-s3-merged
          path: firmware

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware/*.bin
            firmware/flasher_args.json
          generate_release_notes: true
          draft: false
          prerelease: false
