name: ESP32-S3 EYE Build

on:
  push:
    branches: [master]
    paths:
      - 'boards/ESP32_S3_EYE/**'
      - 'platform/**'
      - '.github/workflows/esp32s3-eye-build.yml'
      - 'build_esp32s3_eye.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: docker run --rm -v "$PWD:/project" -w /project espressif/idf:release-v6.0 bash /project/build_esp32s3_eye.sh > build_output.log 2>&1; echo "DOCKER_EXIT=$?"
      - if: always()
        run: |
          tail -80 build_output.log
          mkdir -p firmware_out
          BUILD_DIR="build/ESP32_S3_EYE/idf6.0"
          for f in bootloader/bootloader.bin partition_table/partition-table.bin micropython.bin flash_args flasher_args.json; do
            src="$BUILD_DIR/$f"
            [ -f "$src" ] && cp "$src" firmware_out/ && echo "OK: $f ($(stat -c%s "$src") bytes)" || echo "MISSING: $f"
          done
          cp build_output.log firmware_out/ 2>/dev/null
          ls -lah firmware_out/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-esp32-s3-eye
          path: firmware_out/
          retention-days: 30
          if-no-files-found: warn
