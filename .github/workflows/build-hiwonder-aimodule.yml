name: Build HIWONDER_AI_MODULE Firmware

on:
  push:
    branches:
      - feature/hiwonder-aimodule

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - run: docker run --rm -v "$PWD:/project" -w /project -e BOARD=HIWONDER_AI_MODULE espressif/idf:release-v6.1 bash /project/build_hiwonder_aimodule.sh > build_output.log 2>&1; echo "DOCKER_EXIT=$?"

      - if: always()
        run: |
          tail -80 build_output.log
          mkdir -p firmware_out
          BUILD_DIR="build/HIWONDER_AI_MODULE/idf6.1"
          for f in bootloader/bootloader.bin partition_table/partition-table.bin micropython.bin flash_args flasher_args.json; do
            src="$BUILD_DIR/$f"
            [ -f "$src" ] && cp "$src" firmware_out/ && echo "OK: $f ($(stat -c%s "$src") bytes)" || echo "MISSING: $f"
          done
          cp build_output.log firmware_out/ 2>/dev/null
          ls -lah firmware_out/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-hiwonder-ai-module
          path: firmware_out/
          retention-days: 30
          if-no-files-found: warn
