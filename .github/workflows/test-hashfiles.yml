name: Test HashFiles

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            /tmp/cache1
            /tmp/cache2
          key: test-${{ hashFiles('**/README.md') }}
          restore-keys: |
            test-
      - run: echo "done"
