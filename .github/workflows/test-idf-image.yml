name: Build Hiwonder S3

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix berkeley-db
        run: |
          python3 << 'EOF'
          import glob, os
          patch_text = '#ifndef __P\n#define __P(args) args\n#endif\n#ifndef __BEGIN_DECLS\n#define __BEGIN_DECLS\n#endif\n#ifndef __END_DECLS\n#define __END_DECLS\n#endif\n'
          base = 'lib/micropython/lib/berkeley-db-1.xx/include/berkeley-db'
          if os.path.isdir(base):
              for f in glob.glob(base + '/*.h'):
                  with open(f, 'r') as fh:
                      content = fh.read()
                  if '#ifndef __P' not in content:
                      with open(f, 'w') as fh:
                          fh.write(patch_text + content)
          EOF

      - name: Build firmware
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            -e ESP_IDF_VERSION=6.0 \
            espressif/idf:release-v6.0 \
            bash -c ". /opt/esp/idf/export.sh && make BOARD=HIWONDER_S3 all" 2>&1 | tee build_output.log || true

      - name: Collect firmware files
        if: always()
        run: |
          echo "=== build_output.log tail ==="
          tail -30 build_output.log 2>/dev/null || true
          echo ""
          echo "=== find all files in build ==="
          find build/ -type f 2>/dev/null | head -100
          echo ""
          mkdir -p firmware_out
          # Copy all bin, elf, map, json files to firmware_out
          find build/ \( -name "*.bin" -o -name "*.elf" -o -name "*.map" -o -name "flash_args" -o -name "flasher_args.json" \) -exec cp {} firmware_out/ \; 2>/dev/null || true
          echo "=== firmware_out ==="
          ls -lah firmware_out/ 2>/dev/null || echo "Empty"
          # Also save the build output log
          cp build_output.log firmware_out/ 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-hiwonder-s3
          path: firmware_out/
          retention-days: 30
          if-no-files-found: warn
