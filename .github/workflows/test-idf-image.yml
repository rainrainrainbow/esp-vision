name: Test IDF Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix berkeley-db
        run: |
          python3 << 'EOF'
          import glob, os
          patch_text = '#ifndef __P\n#define __P(args) args\n#endif\n#ifndef __BEGIN_DECLS\n#define __BEGIN_DECLS\n#endif\n#ifndef __END_DECLS\n#define __END_DECLS\n#endif\n'
          base = 'lib/micropython/lib/berkeley-db-1.xx/include/berkeley-db'
          if os.path.isdir(base):
              for f in glob.glob(base + '/*.h'):
                  with open(f, 'r') as fh:
                      content = fh.read()
                  if '#ifndef __P' not in content:
                      with open(f, 'w') as fh:
                          fh.write(patch_text + content)
                      print(f'Patched {f}')
          else:
              print(f'Directory not found: {base}')
          EOF

      - name: Build firmware
        env:
          ESP_IDF_VERSION: "6.0"
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            -e ESP_IDF_VERSION=6.0 \
            espressif/idf:release-v6.0 \
            bash -c ". /opt/esp/idf/export.sh && make BOARD=HIWONDER_S3 all"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-hiwonder-s3
          path: |
            build/*.bin
            build/*.elf
            build/flasher_args.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Merge firmware
        if: success()
        env:
          ESP_IDF_VERSION: "6.0"
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            -e ESP_IDF_VERSION=6.0 \
            espressif/idf:release-v6.0 \
            bash -c ". /opt/esp/idf/export.sh && cd build && esptool.py --chip esp32s3 merge_bin -o firmware_merged.bin @flash_args"

      - name: Upload merged firmware
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware-hiwonder-s3-merged
          path: build/firmware_merged.bin
          retention-days: 30
          if-no-files-found: ignore
