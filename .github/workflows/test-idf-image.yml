name: Build Hiwonder S3

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            -e ESP_IDF_VERSION=6.0 \
            espressif/idf:release-v6.0 \
            bash -c '
              set -e
              git config --global --add safe.directory "*"
              . /opt/esp/idf/export.sh
              make BOARD=HIWONDER_S3 prepare-micropython
              # Patch berkeley-db headers in the BUILD copy
              find build/micropython/ -path "*/berkeley-db/include/berkeley-db/*.h" -exec sed -i "s/__P(/__attribute__((unused)) /g" {} \;
              find build/micropython/ -path "*/berkeley-db/include/berkeley-db/*.h" -exec sed -i "s/__BEGIN_DECLS//"g {} \;
              find build/micropython/ -path "*/berkeley-db/include/berkeley-db/*.h" -exec sed -i "s/__END_DECLS//"g {} \;
              echo "Berkeley-db headers patched"
              make BOARD=HIWONDER_S3 build
            ' 2>&1 | tee build_output.log || true

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p firmware_out
          # Get the actual firmware files from the build output directory
          BUILD_DIR="build/HIWONDER_S3/idf6.0"
          if [ -d "$BUILD_DIR" ]; then
            cp "$BUILD_DIR/bootloader/bootloader.bin" firmware_out/ 2>/dev/null || true
            cp "$BUILD_DIR/partition_table/partition-table.bin" firmware_out/ 2>/dev/null || true
            cp "$BUILD_DIR/ota_data_initial.bin" firmware_out/ 2>/dev/null || true
            cp "$BUILD_DIR/micropython.bin" firmware_out/ 2>/dev/null || true
            cp "$BUILD_DIR/flash_args" firmware_out/ 2>/dev/null || true
            cp "$BUILD_DIR/flasher_args.json" firmware_out/ 2>/dev/null || true
            cp "$BUILD_DIR/micropython.elf" firmware_out/ 2>/dev/null || true
          fi
          cp build_output.log firmware_out/ 2>/dev/null || true
          echo "=== firmware_out ==="
          ls -lah firmware_out/
          echo "=== Total size ==="
          du -sh firmware_out/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-hiwonder-s3
          path: firmware_out/
          retention-days: 30
          if-no-files-found: warn
