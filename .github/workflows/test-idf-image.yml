name: Build Hiwonder S3

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        run: |
          set -o pipefail
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            -e ESP_IDF_VERSION=6.0 \
            espressif/idf:release-v6.0 \
            bash -c '
              set -o pipefail
              git config --global --add safe.directory "*"
              . /opt/esp/idf/export.sh
              make BOARD=HIWONDER_S3 all 2>&1
            ' | tee build_output.log

      - name: Collect firmware
        if: always()
        run: |
          echo "=== Build log tail (50 lines) ==="
          tail -50 build_output.log
          echo ""
          mkdir -p firmware_out
          BUILD_DIR="build/HIWONDER_S3/idf6.0"
          echo "=== Checking $BUILD_DIR ==="
          ls -la "$BUILD_DIR/" 2>/dev/null || echo "Dir not found"
          for f in bootloader/bootloader.bin partition_table/partition-table.bin ota_data_initial.bin micropython.bin flash_args flasher_args.json; do
            src="$BUILD_DIR/$f"
            if [ -f "$src" ]; then
              cp "$src" firmware_out/
              echo "OK: $f ($(stat -c%s "$src") bytes)"
            else
              echo "MISSING: $f"
            fi
          done
          cp build_output.log firmware_out/ 2>/dev/null || true
          echo ""
          echo "=== firmware_out ==="
          ls -lah firmware_out/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-hiwonder-s3
          path: firmware_out/
          retention-days: 30
          if-no-files-found: warn
