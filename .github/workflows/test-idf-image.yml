name: Build Hiwonder S3

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix berkeley-db
        run: |
          python3 << 'EOF'
          import glob, os
          patch_text = '#ifndef __P\n#define __P(args) args\n#endif\n#ifndef __BEGIN_DECLS\n#define __BEGIN_DECLS\n#endif\n#ifndef __END_DECLS\n#define __END_DECLS\n#endif\n'
          base = 'lib/micropython/lib/berkeley-db-1.xx/include/berkeley-db'
          if os.path.isdir(base):
              for f in glob.glob(base + '/*.h'):
                  with open(f, 'r') as fh:
                      content = fh.read()
                  if '#ifndef __P' not in content:
                      with open(f, 'w') as fh:
                          fh.write(patch_text + content)
                      print(f'Patched {f}')
          EOF

      - name: Build firmware
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -w /project \
            -e ESP_IDF_VERSION=6.0 \
            espressif/idf:release-v6.0 \
            bash -c ". /opt/esp/idf/export.sh && make BOARD=HIWONDER_S3 all"

      - name: List build outputs
        run: |
          echo "=== Top-level build ==="
          ls -la build/ 2>/dev/null || echo "No build/ dir"
          echo "=== Board build ==="
          find build/ -name "*.bin" -o -name "*.elf" -o -name "flash_args" 2>/dev/null | head -30
          echo "=== Full tree ==="
          find build/ -maxdepth 4 -type f 2>/dev/null | head -50

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-hiwonder-s3
          path: build/
          retention-days: 30
          if-no-files-found: ignore
