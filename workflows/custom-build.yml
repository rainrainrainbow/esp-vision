name: Build ESP32-S3-CUSTOM

on:
  push:
    branches: [ feature/esp32-s3-custom-board ]
    paths:
      - 'boards/ESP32_S3_CUSTOM/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            -e BOARD=ESP32_S3_CUSTOM \
            espressif/idf:release-v6.1 \
            bash -c '
              set -e
              git config --global --add safe.directory "*"
              . $IDF_PATH/export.sh
              make BOARD=ESP32_S3_CUSTOM all
            '
          echo "=== Build output ==="
          find build -name "*.bin" -type f 2>/dev/null | sort

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: esp32-s3-custom-firmware
          path: |
            build/**/*.bin
          retention-days: 30
