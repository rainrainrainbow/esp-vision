dependencies:
  espressif/mdns: "~1.1.0"
  espressif/tinyusb:
    rules:
      - if: "target in [esp32s2, esp32s3, esp32p4, esp32s31]"
    version: "0.19.0~3"
  espressif/esp_hosted:
    rules:
      - if: "target == esp32p4"
    version: "2.12.8"
  espressif/esp_wifi_remote:
    rules:
      - if: "target == esp32p4"
    version: "1.6.0"
  espressif/lan867x:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  espressif/eppp_link:
    version: "1.1.3"
    rules:
      - if: "target == esp32p4"
  espressif/esp_video:
    version: "2.3.0"
    rules:
      - if: "target in [esp32p4, esp32s31, esp32s3]"
  espressif/esp32-camera:
    version: "2.1.7"
    rules:
      - if: "target in []"
  espressif/esp-dl:
    version: "3.3.6"
    rules:
      - if: "target in [esp32p4, esp32s3, esp32s31]"
  espressif/esp_media_protocols:
    version: "0.6.2"
    rules:
      - if: "target in [esp32p4]"
  espressif/media_lib_sal:
    version: "1.0.2"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_h264:
    version: "1.3.0"
    rules:
      - if: "target in [esp32p4]"
  espressif/usb:
    version: "1.4.1"
    rules:
      - if: "target in [esp32s3, esp32p4, esp32s31]"
  espressif/esp-tflite-micro:
    version: "1.3.7"
    rules:
      - if: "target in [esp32p4, esp32s3, esp32s31]"
  idf:
    version: ">=5.3.0"
