dependencies:
  espressif/mdns: "~1.1.0"
  espressif/tinyusb:
    rules:
      - if: "target in [esp32s2, esp32s3, esp32p4]"
    # Temporary workaround for https://github.com/hathach/tinyusb/issues/3154
    # Can be removed once fix is released in espressif/tinyusb
    git: https://github.com/micropython/tinyusb-espressif.git
    version: cherrypick/dwc2_zlp_fix
  espressif/esp_hosted:
    rules:
      - if: "target == esp32p4"
    version: "2.7.0"
  espressif/esp_wifi_remote:
    rules:
      - if: "target == esp32p4"
    version: "0.15.2"
  espressif/lan867x:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
  espressif/eppp_link:
    version: "1.1.3"
    rules:
      - if: "target == esp32p4"
  espressif/esp_video:
    version: "2.1.0"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp32-camera:
    version: "2.1.6"
    rules:
      - if: "target in [esp32s3]"
  espressif/esp-dl:
    version: "3.3.3"
    rules:
      - if: "target in [esp32p4, esp32s3]"
  idf:
    version: ">=5.3.0"
