<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src ${cspSource} data:; style-src ${cspSource}; script-src 'nonce-${nonce}';">
<link rel="stylesheet" href="${cssUri}">
</head>
<body>
<main>
    <section id="content" class="content" hidden>
        <div class="frame">
            <img id="previewImage" alt="ESP-VISION preview frame" />
        </div>
        <aside class="inspector">
            <header>Histogram</header>
            <div class="channels">
                <section class="channel">
                    <div class="channel-label"><span><i class="red"></i>Red</span></div>
                    <canvas id="histogramRed" aria-label="Red channel histogram"></canvas>
                    <div id="redStats" class="channel-stats"></div>
                </section>
                <section class="channel">
                    <div class="channel-label"><span><i class="green"></i>Green</span></div>
                    <canvas id="histogramGreen" aria-label="Green channel histogram"></canvas>
                    <div id="greenStats" class="channel-stats"></div>
                </section>
                <section class="channel">
                    <div class="channel-label"><span><i class="blue"></i>Blue</span></div>
                    <canvas id="histogramBlue" aria-label="Blue channel histogram"></canvas>
                    <div id="blueStats" class="channel-stats"></div>
                </section>
            </div>
        </aside>
    </section>
    <section id="empty" class="empty">
        <h1>No preview frame</h1>
        <p>Run a script that calls <code>img.flush()</code>.</p>
    </section>
    <footer id="metadata"></footer>
</main>
<script nonce="${nonce}" src="${jsUri}"></script>
</body>
</html>
