---
minimum_pre_commit_version: 3.3.0
default_install_hook_types: [pre-commit]

exclude: |
  (?x)^(
    build/|
    dist/|
    components/imlib/|
    lib/micropython/|
    lib/ulab/|
    overlay/micropython/|
    boards/[^/]+/port/|
    modules/py_assert\.h$|
    modules/py_helper\.[ch]$|
    modules/py_image\.[ch]$|
    modules/py_imageio\.[ch]$
  )

repos:
  - repo: https://github.com/espressif/check-copyright/
    rev: v1.1.1
    hooks:
      - id: check-copyright
        args: ['--config', 'tools/ci/check_copyright_config.yaml', '--ignore', 'tools/ci/check_copyright_ignore.txt']
        exclude: ^platform/main\.c$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: &whitespace_excludes |
          (?x)^(
            .+\.(md|rst|map|bin)|
            .+test.*\/.*expected.*|
            .+known-warnings.*|
            .+\/testdata\/.+|
            .*_pb2\.py|
            .*\.pb-c\.h|
            .*\.pb-c\.c|
            .*\.yuv|
            .*\.base64
          )$
      - id: end-of-file-fixer
        exclude: *whitespace_excludes
      - id: check-yaml
        # .gitlab-ci.yml uses a `spec:` inputs header, which is a separate YAML document
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ['-f=lf']

  - repo: https://github.com/espressif/astyle_py.git
    rev: v1.1.0
    hooks:
      - id: astyle_py
        args: ['--astyle-version=3.4.7', '--rules=tools/ci/astyle-rules.yml']
        exclude: ^platform/main\.c$
