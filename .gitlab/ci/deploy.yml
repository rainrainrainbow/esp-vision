push_to_github:
  stage: deploy
  rules:
    # Manual force push from a web-triggered pipeline (CI/CD -> Run pipeline,
    # set force_push_to_github to true), regardless of branch.
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_FORCE_PUSH_TO_GITHUB == "true"'
      when: manual
    # Automatic sync for tags and for master / release branches.
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH =~ /^release\/v/'
  image: $CI_DOCKER_REGISTRY/esp32-ci-env
  tags:
    - github_sync
  variables:
    GIT_STRATEGY: clone
    SUBMODULES_TO_FETCH: "none"
  dependencies: []
  before_script:
    - echo "skip default before_script"
  script:
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -n "$GH_PUSH_KEY" > ~/.ssh/id_rsa_base64
    - base64 --decode --ignore-garbage ~/.ssh/id_rsa_base64 > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host github.com\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
    - git remote remove github &>/dev/null || true
    - git remote add github git@github.com:espressif/esp-vision.git
    - tools/ci/push_to_github.sh

.deploy_docs_template:
  stage: deploy
  image: $ESP_DOCS_DEPLOY_IMAGE
  tags:
    - deploy_docs
  needs:
    - job: build_docs_html
      artifacts: true
    - job: build_docs_pdf
      artifacts: true
  before_script:
    - python -m pip install -r docs/requirements.txt
    - source "$CI_PROJECT_DIR/.gitlab/ci/utils.sh"
    - add_doc_server_ssh_keys "$DOCS_DEPLOY_PRIVATEKEY" "$DOCS_DEPLOY_SERVER" "$DOCS_DEPLOY_SERVER_USER"
  script:
    - python tools/ci/prepare_docs_landing.py "$DOCS_BUILD_DIR"
    - mkdir -p logs
    - deploy-docs | tee logs/doc-url.txt
    - python tools/ci/check_docs_deployment.py logs/doc-url.txt
  artifacts:
    when: always
    expire_in: 4 days
    paths:
      - logs/doc-url.txt

deploy_docs_preview:
  extends:
    - .deploy_docs_template
    - .rules:docs:preview
  environment:
    name: "esp-vision-docs/$CI_COMMIT_REF_SLUG"
    url: "$DOCS_PREVIEW_URL_BASE/zh_CN/$CI_COMMIT_REF_SLUG/index.html"
  variables:
    TYPE: preview
    GIT_VER: "$CI_COMMIT_REF_SLUG"
    DOCS_BUILD_DIR: "$CI_PROJECT_DIR/docs/_build"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PREVIEW_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PREVIEW_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PREVIEW_SERVER_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PREVIEW_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PREVIEW_URL_BASE"

deploy_docs_production:
  extends:
    - .deploy_docs_template
    - .rules:docs:production
  environment:
    name: esp-vision-docs-production
    url: "$DOCS_PROD_URL_BASE/zh_CN/latest/index.html"
  variables:
    TYPE: production
    GIT_VER: latest
    DOCS_BUILD_DIR: "$CI_PROJECT_DIR/docs/_build"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PROD_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PROD_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PROD_SERVER_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PROD_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PROD_URL_BASE"

post_docs_preview:
  stage: post_deploy
  extends: .rules:docs:preview
  image: python:3.11-slim
  tags:
    - deploy_docs
  needs:
    - job: deploy_docs_preview
      artifacts: true
  script:
    - python tools/ci/post_docs_preview.py logs/doc-url.txt
  allow_failure: true

# --------------------------------------------------------------------------- #
# esp-launchpad release (tag only)
#
# On a semver tag, reuse the stable release firmware artifacts, merge each
# published board into a single flashable image suffixed with the tag, generate
# the launchpad config.toml, and hand the binaries/ directory to the AE
# ae_upload_dl pipeline, which copies them additively to
# https://dl.espressif.com/AE/esp-vision/ (no deletion of previous releases).
# --------------------------------------------------------------------------- #

pack_launchpad:
  stage: deploy
  extends: .rules:release
  image: espressif/idf:release-v5.5
  tags:
    - build
  variables:
    # Fetch full history + all tags: generate_launchpad lists every published
    # release tag in config.toml's [website].releases. A shallow clone would
    # truncate that to only the tag being built.
    GIT_DEPTH: "0"
  # Reuse the already-built release firmware artifacts; do not rebuild. P4/S3
  # use release/v5.5 and S31 uses release/v6.1. Keep this list in sync with
  # tools/ci/launchpad/boards.yml.
  needs:
    - job: "firmware: [release-v5.5, ESP32_P4X_EYE]"
      artifacts: true
    - job: "firmware: [release-v5.5, ESP32_P4X_FUNCTION_EV_BOARD]"
      artifacts: true
    - job: "firmware: [release-v5.5, ESP32_S3_EYE]"
      artifacts: true
    - job: "firmware: [release-v6.1, ESP32_S31_KORVO]"
      artifacts: true
  before_script:
    # Pin esptool >= 5.3: release-v5.5's bundled version predates the esp32s31
    # target (ESP32_S31_KORVO, IDF_TARGET esp32s31). esptool 5.3 adds esp32s31
    # support and still merges the esp32p4 / esp32s3 images built by this same
    # IDF release.
    - python -m pip install --upgrade "esptool>=5.3" rtoml pyyaml
  script:
    - python tools/ci/launchpad/generate_launchpad.py "$CI_COMMIT_TAG"
    # Publish the MCP API pack alongside config.toml by dropping it into the same
    # binaries/ tree the AE ae_upload_dl job copies to dl.espressif.com. Lands at
    # dl.espressif.com/AE/esp-vision/mcp/{latest.json,mcp-pack-<tag>.json}.
    # Best-effort (|| true): the real gates are mcp_pack_check + build_mcp_pack;
    # never block a firmware release on pack publishing.
    - git submodule update --init --depth 1 lib/micropython || true
    - python -m pip install --upgrade jsonschema || true
    - mkdir -p binaries/mcp
    - |
      mcp_pack="binaries/mcp/mcp-pack-$CI_COMMIT_TAG.json"
      if python docs/gen_mcp.py "$CI_COMMIT_TAG" --out "$mcp_pack" \
         && python tools/ci/mcp/validate_schema.py "$mcp_pack"; then
        cp "$mcp_pack" binaries/mcp/latest.json
      else
        echo "WARNING: MCP pack generation/validation failed; skipping MCP publish"
        rm -f "$mcp_pack" binaries/mcp/latest.json
      fi
  artifacts:
    when: on_success
    expire_in: 1 month
    paths:
      - binaries/

# trigger.yml defines the upload-dl-trigger job (image / script / tags) that
# triggers the AE ae_upload_dl pipeline. The override below only adds the
# release gate, the dependency on the packed binaries, the source-project token
# and the launchpad environment link.
include:
  - project: 'ae_group/test-related/ae_upload_dl'
    file: 'trigger.yml'

upload-dl-trigger:
  extends: .rules:release
  needs:
    - job: pack_launchpad
      artifacts: false
  # environment.url is only the clickable link shown in GitLab's Environments
  # UI; it does not affect the upload or config.toml. Point it at the published
  # directory rather than any specific frontend. The config.toml itself stays
  # esp-launchpad-compatible, so it can also be opened with the online flasher:
  #   https://espressif.github.io/esp-launchpad/?flashConfigURL=https://dl.espressif.com/AE/esp-vision/config.toml
  environment:
    name: esp-vision_release
    url: https://dl.espressif.com/AE/esp-vision/
  variables:
    # Project access token (api + read_api) so ae_upload_dl can download the
    # pack_launchpad artifacts from this pipeline. Define UPLOAD_ACCESS_TOKEN as
    # a masked/protected CI/CD variable in the esp-vision project settings.
    SOURCE_PROJECT_TOKEN: ${UPLOAD_ACCESS_TOKEN}
