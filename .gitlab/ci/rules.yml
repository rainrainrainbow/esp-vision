.docs_changes: &docs_changes
  - ".gitlab-ci.yml"
  - ".gitlab/ci/**/*"
  - "docs/**/*"
  - "stubs/**/*"
  - "example/**/*"
  - "modules/**/*"
  - "components/imlib/**/*"
  - "components/zxing/**/*"
  - "boards/**/*.cmake"
  - "boards/**/*.h"
  - "boards/**/manifest.py"
  - "boards/**/board_inisetup.py"
  - "micropython.cmake"
  - "overlay/micropython/**/*.c"
  - "overlay/micropython/**/*.h"
  - "overlay/micropython/**/*.cmake"

# Paths that affect the compiled firmware. Editing only docs (docs/**, *.md,
# stubs/**, example/**, LICENSE, ...) must NOT trigger a firmware rebuild.
.firmware_changes: &firmware_changes
  - "Makefile"
  - "idf_ext.py"
  - "micropython.cmake"
  - ".gitmodules"
  - ".gitlab-ci.yml"
  - ".gitlab/ci/**/*"
  - "platform/**/*"
  - "modules/**/*"
  - "components/**/*"
  - "boards/**/*"
  - "overlay/**/*"
  - "lib/**/*"
  - "models/**/*"
  - "tools/**/*"

.docs_source_changes: &docs_source_changes
  - "example/**/*"
  - "modules/**/*"
  - "components/imlib/**/*"
  - "components/zxing/**/*"
  - "boards/**/*.cmake"
  - "boards/**/*.h"
  - "boards/**/manifest.py"
  - "boards/**/board_inisetup.py"
  - "micropython.cmake"
  - "overlay/micropython/**/*.c"
  - "overlay/micropython/**/*.h"
  - "overlay/micropython/**/*.cmake"

.rules:docs:build:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *docs_changes

.rules:docs:impact:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *docs_source_changes

.rules:docs:preview:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *docs_changes

.rules:docs:production:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

# Firmware build: always on tags and on master, otherwise only when
# firmware-relevant files change (so docs-only commits skip compilation).
.rules:build:firmware:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: *firmware_changes
    - if: '$CI_COMMIT_BRANCH'
      changes: *firmware_changes
