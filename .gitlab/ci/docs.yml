docs_impact_check:
  stage: check
  extends: .rules:docs:impact
  image: python:3.11-slim
  tags:
    - build
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git
  script:
    - python tools/ci/check_docs_impact.py
  allow_failure: true

.build_docs_template:
  stage: build_docs
  extends: .rules:docs:build
  image: $ESP_DOCS_BUILD_IMAGE
  tags:
    - build_docs
  dependencies: []
  before_script:
    - python -m pip install --upgrade -r docs/requirements.txt
    - python -m pip show esp-docs
    - build-docs --help | grep -q esp32s31
    - python tools/ci/check_docs_format.py
    - python tools/ci/check_docs_lang_sync.py
  script:
    - cd docs
    - build-docs -bs "$DOC_BUILDER" -l "$DOC_LANG" -t esp32p4 esp32s3 esp32s31
  parallel:
    matrix:
      - DOC_LANG:
          - en
          - zh_CN

build_docs_html:
  extends: .build_docs_template
  variables:
    DOC_BUILDER: html
  artifacts:
    when: always
    expire_in: 4 days
    paths:
      - docs/_build/*/*/*.txt
      - docs/_build/*/*/html/

build_docs_pdf:
  extends: .build_docs_template
  variables:
    DOC_BUILDER: latex
  artifacts:
    when: always
    expire_in: 4 days
    paths:
      - docs/_build/*/*/*.txt
      - docs/_build/*/*/latex/

# Build the full MCP API knowledge pack, including the MicroPython surface, which
# requires the pinned lib/micropython submodule (docs/library/*.rst). This is the
# authoritative artifact the website MCP sidecar consumes (via dl at release).
# Same docs-change rules as the doc build; runs on master and on doc-affecting MRs.
build_mcp_pack:
  stage: build_docs
  extends: .rules:docs:build
  image: $ESP_DOCS_BUILD_IMAGE
  tags:
    - build_docs
  dependencies: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    # Only the micropython repo's docs/library/*.rst are needed (no recursion).
    - git submodule update --init --depth 1 lib/micropython
    - python -m pip install --upgrade jsonschema
  script:
    - python docs/gen_mcp.py "${CI_COMMIT_TAG:-$CI_COMMIT_REF_SLUG}" --out mcp-pack.json
    - python tools/ci/mcp/validate_schema.py mcp-pack.json
  artifacts:
    when: on_success
    expire_in: 4 days
    paths:
      - mcp-pack.json
