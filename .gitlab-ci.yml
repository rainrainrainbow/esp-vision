spec:
  inputs:
    force_push_to_github:
      type: boolean
      default: false

---

stages:
  - check
  - build
  - build_docs
  - deploy
  - post_deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

variables:
  GIT_SUBMODULE_STRATEGY: none
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"
  ESP_DOCS_BUILD_IMAGE: "$CI_DOCKER_REGISTRY/esp-idf-doc-env-v5.5:1-1"
  ESP_DOCS_DEPLOY_IMAGE: "$CI_DOCKER_REGISTRY/esp-idf-doc-env-v5.5"
  CI_FORCE_PUSH_TO_GITHUB: "$[[ inputs.force_push_to_github ]]"

include:
  - local: '.gitlab/ci/rules.yml'
  - local: '.gitlab/ci/docs.yml'
  - local: '.gitlab/ci/deploy.yml'

pre_commit:
  stage: check
  tags:
    - build
  image: python:3.11-slim
  cache:
    key:
      files:
        - .pre-commit-config.yaml
    paths:
      - .cache/pip/
      - .cache/pre-commit/
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git
    - python -m pip install --upgrade pip
    - python -m pip install pre-commit
  script:
    - pre-commit run --all-files --show-diff-on-failure astyle_py
    - pre-commit run --all-files --show-diff-on-failure check-copyright

python_stubs:
  stage: check
  tags:
    - build
  image: python:3.11-slim
  script:
    - python -m py_compile stubs/*.pyi
    - python -m py_compile idf_ext.py

# Catch board-config drift early: build config.toml's [website] region from the
# board configs without IDF/esptool (--dry-run). This exercises board_model and
# generate_launchpad on every pipeline, not just at tag release, so a broken
# board.json / imlib_config.h fails here instead of at publish time.
launchpad_config_check:
  stage: check
  tags:
    - build
  image: python:3.11-slim
  script:
    - python -m pip install --upgrade rtoml pyyaml
    - python tools/ci/launchpad/generate_launchpad.py --dry-run "${CI_COMMIT_TAG:-v0.0.0-dev}"

# Dead-link check for markdown files (relative paths + web URLs). Network
# flakiness shouldn't block the pipeline, so only report 404s and allow failure.
check_readme_links:
  stage: check
  tags:
    - build
  image: python:3.11-slim
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.md"
        - "tools/ci/check_readme_links.py"
  script:
    - python tools/ci/check_readme_links.py

.firmware_base:
  stage: build
  extends: .rules:build:firmware
  tags:
    - build
  variables:
    # Cap ninja compile parallelism so the heavy ESP-DL + zxing C++ translation
    # units stay below the CI runner memory limit. ESP-IDF v6.0's idf.py dropped
    # IDF_PY_BUILD_JOBS and runs `ninja` with no -j, so we inject -j via a ninja
    # wrapper in before_script instead (see below). Raise once runner RAM allows.
    NINJA_MAX_JOBS: "2"
  image:
    name: espressif/idf:$IDF_IMAGE
    entrypoint: [""]
  before_script:
    - git submodule sync -- lib/micropython lib/ulab lib/zxing-cpp
    - git submodule update --init --depth 1 lib/micropython lib/ulab lib/zxing-cpp
    - git -C lib/micropython submodule sync -- lib/micropython-lib
    - git -C lib/micropython submodule update --init --depth 1 lib/micropython-lib
    - . /opt/esp/idf/export.sh
    # idf.py (esp. v6.0) invokes `ninja` with no job limit, so ESP-DL + zxing
    # compile at full core count and OOM the runner. Shadow ninja with a wrapper
    # that injects `-j $NINJA_MAX_JOBS`. This is resolved via PATH by idf.py, so
    # it covers both the `make` and `idf.py --board` build paths on every IDF
    # version. The real ninja is captured by absolute path to avoid recursion.
    - REAL_NINJA="$(command -v ninja)"
    - mkdir -p "$CI_PROJECT_DIR/.ci-bin"
    - printf '#!/bin/sh\nexec "%s" -j "%s" "$@"\n' "$REAL_NINJA" "${NINJA_MAX_JOBS:-2}" > "$CI_PROJECT_DIR/.ci-bin/ninja"
    - chmod +x "$CI_PROJECT_DIR/.ci-bin/ninja"
    - export PATH="$CI_PROJECT_DIR/.ci-bin:$PATH"
    - echo "ninja wrapper active -> $REAL_NINJA -j ${NINJA_MAX_JOBS:-2}"
  script:
    - make BOARD="$BOARD" build
  after_script:
    - |
      if [ -d "build/$BOARD" ]; then
        find "build/$BOARD" -path '*/log/idf_py_*_output_*' -type f ! -name '*.txt' | while IFS= read -r log; do
          mv "$log" "$log.txt"
        done
      fi
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/$BOARD/idf*/log/
      - build/$BOARD/idf*/bootloader/bootloader.bin
      - build/$BOARD/idf*/partition_table/partition-table.bin
      - build/$BOARD/idf*/micropython.bin
      # flash_args lists the {offset, file} pairs consumed by `esptool merge_bin`
      # in the tag-release pack_launchpad job (see .gitlab/ci/deploy.yml). These
      # boards use a single factory app with no OTA, so flash_args references
      # only the three .bin files already collected above.
      - build/$BOARD/idf*/flash_args

# Stable release lines (blocking): every board on every supported IDF release.
firmware:
  extends: .firmware_base
  parallel:
    matrix:
      - IDF_IMAGE: ["release-v5.5", "release-v6.0"]
        BOARD:
          - ESP32_P4X_EYE
          - ESP32_P4X_FUNCTION_EV_BOARD
          - ESP32_S3_EYE
          - TEMPLATE

# Keep the board-aware idf.py extension honest without duplicating the full
# firmware matrix covered by the make entry point above.
firmware_idf_py:
  extends: .firmware_base
  script:
    - idf.py --board "$BOARD" build
  parallel:
    matrix:
      - IDF_IMAGE: ["release-v5.5", "release-v6.0"]
        BOARD:
          - ESP32_P4X_EYE

# IDF master (currently 6.1-dev) is a moving target: track it but don't block the pipeline.
firmware_master:
  extends: .firmware_base
  allow_failure: true
  parallel:
    matrix:
      - IDF_IMAGE: ["latest"]
        BOARD:
          - ESP32_P4X_EYE
          - ESP32_P4X_FUNCTION_EV_BOARD
          - ESP32_S3_EYE
          - ESP32_S31_KORVO
          - TEMPLATE

firmware_idf_py_master:
  extends: .firmware_base
  allow_failure: true
  script:
    - idf.py --board "$BOARD" build
  parallel:
    matrix:
      - IDF_IMAGE: ["latest"]
        BOARD:
          - ESP32_P4X_EYE
