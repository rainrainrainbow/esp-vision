stages:
  - check
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

variables:
  GIT_SUBMODULE_STRATEGY: none
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

pre_commit:
  stage: check
  image: python:3.11-slim
  cache:
    key:
      files:
        - .pre-commit-config.yaml
    paths:
      - .cache/pip/
      - .cache/pre-commit/
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git
    - python -m pip install --upgrade pip
    - python -m pip install pre-commit
  script:
    - pre-commit run --all-files --show-diff-on-failure astyle_py
    - pre-commit run --all-files --show-diff-on-failure check-copyright

python_stubs:
  stage: check
  image: python:3.11-slim
  script:
    - python -m py_compile stubs/*.pyi

firmware:
  stage: build
  image:
    name: espressif/idf:release-v5.5
    entrypoint: [""]
  parallel:
    matrix:
      - BOARD:
          - ESP32_P4X_EYE
          - ESP32_P4X_FUNCTION_EV_BOARD
          - ESP32_S3_EYE
          - TEMPLATE
  before_script:
    - git submodule sync -- lib/micropython lib/ulab lib/zxing-cpp
    - git submodule update --init --depth 1 lib/micropython lib/ulab lib/zxing-cpp
    - git -C lib/micropython submodule sync -- lib/micropython-lib
    - git -C lib/micropython submodule update --init --depth 1 lib/micropython-lib
    - . /opt/esp/idf/export.sh
  script:
    - make BOARD="$BOARD" build
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/$BOARD/log/
      - build/$BOARD/bootloader/bootloader.bin
      - build/$BOARD/partition_table/partition-table.bin
      - build/$BOARD/micropython.bin
